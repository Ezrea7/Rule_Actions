name: "PingMe_WeTalk_AllInOne"
description: "PingMe_WeTalk_AllInOne自动化签到+视频奖励"
author: "TG@ZenMoFiShi@yaowuliu"
icon: https://raw.githubusercontent.com/axhani/icon/refs/heads/main/pingme&wetalk.png

compat_arguments:
  CAPTURE_ENABLED: false
  CRON_TASK: "20 */4 * * *"
  CRON_TASK_TIMEOUT: 300

compat_arguments_schema:
  CAPTURE_ENABLED:
    name: "禁用账号抓取"
    description: "开启‘禁用账号抓取‘后抓包脚本不再处理任何请求"
    options:
      - true
      - false
    default_value: false

  CRON_TASK:
    name: "定时任务"
    description: "自定义任务运行时间"
    default_value: "20 */4 * * *"

  CRON_TASK_TIMEOUT:
    name: "定时任务超时时间"
    description: "自定义定时任务超时时间"
    default_value: 300

scriptings:
  - http_request:
      name: "账号抓取"
      match: "^https://api\\.(wetalkapp\\.com|pingmeapp\\.net)/app/queryBalanceAndBonus"
      script_url: "https://github.com/158212892/QuantumultXMark/raw/refs/heads/main/My/Scripts/PingMe_WeTalk_AllInOne.js"
      timeout: 10
      disabled: {{{CAPTURE_ENABLED}}}

  - schedule:
      name: "定时任务"
      cron: "{{{CRON_TASK}}}"
      script_url: "https://github.com/158212892/QuantumultXMark/raw/refs/heads/main/My/Scripts/PingMe_WeTalk_AllInOne.js"
      timeout: {{{CRON_TASK_TIMEOUT}}}

mitm:
  hostnames:
    - "api.pingmeapp.net"
    - "api.wetalkapp.com"
