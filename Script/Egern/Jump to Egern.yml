name: Loon&Surge 2 Egern
description: 使可莉插件中心等部分Loon或Surge插件站点安装时直接跳转Egern, 最低版本Egern v2.18.0
author: https://hub.kelee.one, https://kelvinlab.wuyra.com, https://loonlab.103516.xyz/Plugin, https://surge.qingr.moe
icon: https://hub.kelee.one/IMG/Web/favicon_32px.ico
