body_rewrites:
- response_regex:
    match: https://hub\.kelee\.one/(?:Lpx_)?list\.json
    find: loon://import\?plugin
    replace: egern:///modules/new?url
- response_regex:
    match: ^https?:\/\/kelvinlab\.wuyra\.com\/list.json
    find: loon:\/\/import\?plugin=|surge:\/\/\/install-module\?url=
    replace: egern:///modules/new?url=
- response_regex:
    match: ^https?:\/\/kelvinlab\.wuyra\.com\/list.json
    find: https:\/\/www\.nsloon\.com\/openloon\/import\?rules=
    replace: egern:///rules/new?type=rule_set&policy=DIRECT&match=
- response_regex:
    match: ^https?:\/\/loonlab\.103516\.xyz\/Plugin
    find: loon:\/\/import\?plugin=|surge:\/\/\/install-module\?url=
    replace: egern:///modules/new?url=
- response_regex:
    match: ^https?:\/\/loonlab\.103516\.xyz\/Plugin
    find: Loon 插件仓库
    replace: Loon2Egern 插件仓库
- response_regex:
    match: https://surge\.qingr\.moe/
    find: href="surge:///install-module\?url=
    replace: href="egern:///modules/new?url=

mitm:
  hostnames:
    includes:
      - hub.kelee.one
      - kelvinlab.wuyra.com
      - loonlab.103516.xyz
      - surge.qingr.moe