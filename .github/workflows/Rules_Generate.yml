name: Rule_Generate

on:
  schedule:
    - cron: '0 1 * * *'
  pull_request:
    branches: [ "Rules_Actions" ]
  repository_dispatch:
    types: [bot_trigger]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ 关键：升级到 v6（原生 Node 24，无警告）
      - uses: actions/checkout@v7

      - name: Print current directory
        run: |
          cd ./Rules/
          pwd

      - name: "拉取"
        run: python Rules/Script/Get_File.py

      - name: "合并"
        run: python Rules/Script/Merge_File.py

      - name: Commit files
        run: |
          git config --local user.email "Ezrea7@gmail.com"
          git config --local user.name "Ezrea7"
          git add ./*
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Rules"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GIT_TOKEN }}
          branch: Rules_Actions
          force: false
